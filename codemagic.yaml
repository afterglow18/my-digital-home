workflows:
  ios-distribution:
    name: My Digital Jewelry Box – iOS
    max_build_duration: 60
    environment:
      groups:
        - app_store_credentials
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.mydigitaljewelrybox.app
      vars:
        XCODE_WORKSPACE: "artifacts/outfit-generator/ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.mydigitaljewelrybox.app"
        APPLE_TEAM_ID: "2A78MFVCJS"
    scripts:
      - name: Install dependencies
        script: |
          npm install -g pnpm --force
          # Replace workspace config with a CI-safe version:
          # - No Linux/Replit-only platform exclusions (macOS needs darwin binaries)
          # - No minimumReleaseAge (not needed in CI)
          # - onlyBuiltDependencies explicitly listed so pnpm allows their build scripts
          cat > pnpm-workspace.yaml << 'EOF'
          packages:
            - artifacts/*
            - lib/*
            - lib/integrations/*
            - scripts

          autoInstallPeers: false

          onlyBuiltDependencies:
            - '@google/genai'
            - '@swc/core'
            - esbuild
            - msw
            - protobufjs
            - unrs-resolver

          overrides:
            "react": "19.1.0"
            "react-dom": "19.1.0"
            esbuild: "0.27.3"
          EOF
          pnpm install --no-frozen-lockfile

      - name: Build web app
        script: pnpm --filter @workspace/outfit-generator build

      - name: Install Capacitor CLI
        script: pnpm --filter @workspace/outfit-generator exec cap --version || npm install -g @capacitor/cli

      - name: Add iOS platform (if not present)
        script: |
          cd artifacts/outfit-generator
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi

      - name: Sync Capacitor
        script: |
          cd artifacts/outfit-generator
          npx cap sync ios

      - name: Install CocoaPods
        script: |
          cd artifacts/outfit-generator/ios/App
          pod install

      - name: Set up code signing
        script: xcode-project use-profiles

      - name: Build and archive
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
